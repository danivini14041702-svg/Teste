<script>
// ==================== PROJECT HYDRA v0.2 ====================
const Hydra = {
    version: "0.2",
    config: { darkMode: true, zoom: 100, floatingButton: true },

    modules: {},
    listeners: {},

    init() {
        console.log(`%c🚀 Hydra v${this.version} carregado`, "color:#00ffcc;font-size:18px;font-weight:bold");
        this.UI.create();
        this.loadCoreModules();
    },

    Events: {
        on(event, callback) { 
            if (!this.listeners[event]) this.listeners[event] = [];
            this.listeners[event].push(callback);
        },
        emit(event, data) {
            if (this.listeners[event]) this.listeners[event].forEach(cb => cb(data));
        }
    },

    API: {
        DOM: {
            hide: (s) => document.querySelectorAll(s).forEach(el => el.style.display = 'none')
        },
        CSS: {
            inject: (css) => { const s = document.createElement('style'); s.textContent = css; document.head.appendChild(s); }
        },
        Page: {
            setZoom: (v) => { document.body.style.zoom = v + '%'; }
        }
    },

    UI: {
        create() {
            const ui = document.createElement('div');
            ui.id = "hydra-root";
